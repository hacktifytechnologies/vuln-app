- name: 'HACKTIFY: Setup bWAPP RFI'
  id: 8d99e654-0cb2-4f39-995c-61c66671bc1f
  description: >-
    Deploys the bWAPP RFI environment for the red team participant.
  tactic: execution
  technique_id: T1059
  technique_name: 'Command and Scripting Interpreter'
  singleton: true
  repeatable: false
  delete_payload: false
  executors:
    - name: sh
      platform: linux
      command: >
        rm -rf /opt/hacktify/vuln-app && git clone https://github.com/hacktifytechnologies/vuln-app.git /opt/hacktify/vuln-app && cd /opt/hacktify/vuln-app/challenges/red_07_bwapp_rfi && chmod +x setup.sh && bash setup.sh
      cleanup: >
        docker rm -f bwapp-rfi 2>/dev/null || true
