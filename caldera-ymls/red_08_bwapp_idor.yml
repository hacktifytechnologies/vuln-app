  description: >-
    Deploys the bWAPP IDOR environment for the red team participant.
  tactic: privilege-escalation
  technique_id: T1078
  technique_name: 'Valid Accounts'
  singleton: true
  repeatable: false
  delete_payload: false
  executors:
    - name: sh
      platform: linux
      command: >
        rm -rf /opt/hacktify/vuln-app && git clone https://github.com/hacktifytechnologies/vuln-app.git /opt/hacktify/vuln-app && cd /opt/hacktify/vuln-app/challenges/red_08_bwapp_idor && chmod +x setup.sh && bash setup.sh
