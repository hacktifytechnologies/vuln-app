- name: 'HACKTIFY: Setup bWAPP XXE'
  id: dd1c49f7-6a2d-407d-a959-bc28dcae6479
  description: >-
    Deploys the bWAPP XXE environment for the red team participant.
  tactic: discovery
  technique_id: T1083
  technique_name: 'File and Directory Discovery'
  singleton: true
  repeatable: false
  delete_payload: false
  executors:
    - name: sh
      platform: linux
      command: >
        rm -rf /opt/hacktify/vuln-app && git clone https://github.com/hacktifytechnologies/vuln-app.git /opt/hacktify/vuln-app && cd /opt/hacktify/vuln-app/challenges/red_06_bwapp_xxe && chmod +x setup.sh && bash setup.sh
      cleanup: >
        docker rm -f bwapp-xxe 2>/dev/null || true
